server.port=9090
server.compression.enabled=true
server.servlet.session.timeout=30m
server.tomcat.max-threads=200
spring.application.name=TestApp
spring.output.ansi.enabled=always
spring.jackson.serialization.indent-output=false
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.com.example.production=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
app.cache.ttl-seconds=60
app.cache.max-size=1000
app.threads.core-pool-size=4
app.threads.max-pool-size=10
app.retry.max-attempts=3
app.retry.backoff-delay-ms=1000
app.security.jwt.secret=changeme-in-production
app.security.jwt.expiration-ms=86400000
app.security.cors.allowed-origins=https://app.example.com
app.security.cors.allowed-methods=GET,POST,PUT,DELETE
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=60
app.feature.new-dashboard=false
app.feature.beta-search=true
app.pagination.default-page-size=20
app.pagination.max-page-size=100
app.upload.max-file-size=10MB
app.upload.max-request-size=50MB
app.monitoring.enabled=true
app.monitoring.alert-email=admin@example.com
app.monitoring.alert-on-error=true
app.monitoring.alert-on-slow-request=true
app.monitoring.slow-request-threshold-ms=2000
app.monitoring.metrics-export-interval-ms=15000
app.monitoring.health-check-path=/health
spring.sql.init.mode=never
app.security.session.max-concurrent=5
app.security.oauth2.issuer-uri=https://auth.example.com
app.backup.enabled=true
app.backup.cron=0 0 2 * * ?
app.backup.retention-days=30
