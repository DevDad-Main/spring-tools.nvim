server.port=9091
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jackson.serialization.indent-output=true
logging.level.com.example.production=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=TRACE
app.cache.ttl-seconds=10
app.cache.max-size=100
app.rate-limit.enabled=false
app.monitoring.alert-email=dev@example.com
app.monitoring.metrics-export-interval-ms=5000
app.security.jwt.secret=dev-secret-key-not-for-production
app.security.jwt.expiration-ms=3600000
app.security.cors.allowed-origins=http://localhost:3000
app.feature.new-dashboard=true
app.pagination.default-page-size=10
app.upload.max-file-size=10MB
app.threads.core-pool-size=4
app.retry.max-attempts=3
app.security.cors.allowed-methods=GET,POST,PUT,DELETE
app.dev.reload-on-save=true
app.dev.hot-reload=true
app.dev.livereload-port=35729
app.dev.mock-payments=true
app.dev.seed-data=true
app.dev.log-http-requests=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms
server.error.include-stacktrace=always
server.error.include-message=always
devtools.restart.enabled=true
