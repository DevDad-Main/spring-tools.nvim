server.port=9091
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jackson.serialization.indent-output=true
logging.level.com.example.production=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=TRACE
app.cache.ttl-seconds=10
app.cache.max-size=100
app.rate-limit.enabled=false
app.monitoring.alert-email=dev@example.com
app.monitoring.metrics-export-interval-ms=5000
app.security.jwt.secret=dev-secret-key-not-for-production
app.security.jwt.expiration-ms=3600000
app.security.cors.allowed-origins=http://localhost:3000
app.feature.new-dashboard=true
app.pagination.default-page-size=10
