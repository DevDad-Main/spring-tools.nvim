server.port=9090
server.compression.enabled=true
spring.application.name=ProductionApp
spring.output.ansi.enabled=always
logging.level.com.example.production=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
app.cache.ttl-seconds=60
app.cache.max-size=1000
app.threads.core-pool-size=4
app.threads.max-pool-size=10
app.retry.max-attempts=3
app.retry.backoff-delay-ms=1000
app.security.jwt.secret=changeme-in-production
app.security.jwt.expiration-ms=86400000
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=60
app.upload.max-file-size=10MB
app.upload.max-request-size=50MB
app.monitoring.enabled=true
app.monitoring.alert-email=admin@example.com
app.monitoring.alert-on-error=true
app.monitoring.alert-on-slow-request=true
app.monitoring.slow-request-threshold-ms=2000
